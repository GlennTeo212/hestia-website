<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hestia Design and Builds | Interior Design</title>
    <style>
        :root { --bg-primary: #0a0a0a; --bg-secondary: #141414; --text-primary: #f5f5f5; --text-secondary: #8a8a8a; --accent: #c9a962; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 60px; }
        
        /* Portfolio */
        .portfolio { padding: 100px 0; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-label { color: var(--accent); letter-spacing: 0.2em; font-size: 12px; margin-bottom: 10px; }
        .section-title { font-size: 48px; font-weight: 300; }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .portfolio-item { position: relative; aspect-ratio: 4/5; overflow: hidden; }
        .project-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 100%; height: 100%; }
        .project-gallery img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.3s; }
        .project-gallery img:hover { transform: scale(1.02); }
        
        /* Fullscreen Gallery */
        .fs-gallery { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .fs-gallery.open { display: flex; align-items: center; justify-content: center; }
        .fs-gallery img { max-width: 90%; max-height: 90vh; object-fit: contain; }
        .fs-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: #fff; border: none; font-size: 40px; width: 60px; height: 60px; cursor: pointer; border-radius: 50%; }
        .fs-btn:hover { background: var(--accent); }
        .fs-prev { left: 20px; }
        .fs-next { right: 20px; }
        .fs-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; background: none; border: none; cursor: pointer; }
        .fs-counter { position: absolute; bottom: 20px; color: #fff; font-size: 18px; }
    </style>
</head>
<body>
    <section class="portfolio" id="portfolio">
        <div class="container">
            <div class="section-header">
                <p class="section-label">Our Work</p>
                <h2 class="section-title">Featured Projects</h2>
            </div>
            <div class="portfolio-grid">
                <div class="portfolio-item">
                    <div class="project-gallery">
                        <img src="projects/photo-1.jpg" alt="">
                        <img src="projects/photo-2.jpg" alt="">
                        <img src="projects/photo-3.jpg" alt="">
                        <img src="projects/photo-4.jpg" alt="">
                        <img src="projects/photo-5.jpg" alt="">
                        <img src="projects/photo-6.jpg" alt="">
                        <img src="projects/photo-7.jpg" alt="">
                        <img src="projects/photo-8.jpg" alt="">
                        <img src="projects/photo-9.jpg" alt="">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Fullscreen Gallery -->
    <div class="fs-gallery" id="fsGallery">
        <button class="fs-close" id="fsClose">×</button>
        <button class="fs-btn fs-prev" id="fsPrev">‹</button>
        <img id="fsImg" src="" alt="">
        <button class="fs-btn fs-next" id="fsNext">›</button>
        <div class="fs-counter" id="fsCounter">1 / 18</div>
    </div>

    <script>
        const fsGallery = document.getElementById('fsGallery');
        const fsImg = document.getElementById('fsImg');
        const fsClose = document.getElementById('fsClose');
        const fsPrev = document.getElementById('fsPrev');
        const fsNext = document.getElementById('fsNext');
        const fsCounter = document.getElementById('fsCounter');

        const photos = [
            'projects/photo-1.jpg','projects/photo-2.jpg','projects/photo-3.jpg',
            'projects/photo-4.jpg','projects/photo-5.jpg','projects/photo-6.jpg',
            'projects/photo-7.jpg','projects/photo-8.jpg','projects/photo-9.jpg',
            'projects/photo-10.jpg','projects/photo-11.jpg','projects/photo-12.jpg',
            'projects/photo-13.jpg','projects/photo-14.jpg','projects/photo-15.jpg',
            'projects/photo-16.jpg','projects/photo-17.jpg','projects/photo-18.jpg'
        ];
        let idx = 0;

        function showPhoto(i) {
            idx = i;
            fsImg.src = photos[idx];
            fsCounter.textContent = (idx + 1) + ' / ' + photos.length;
            fsGallery.classList.add('open');
        }

        // Add click handlers to all images
        document.querySelectorAll('.project-gallery img').forEach(function(img, i) {
            img.addEventListener('click', function(e) {
                e.preventDefault();
                showPhoto(i);
            });
        });

        fsPrev.addEventListener('click', function(e) { 
            e.stopPropagation(); 
            idx = (idx - 1 + photos.length) % photos.length;
            fsImg.src = photos[idx];
            fsCounter.textContent = (idx + 1) + ' / ' + photos.length;
        });

        fsNext.addEventListener('click', function(e) { 
            e.stopPropagation(); 
            idx = (idx + 1) % photos.length;
            fsImg.src = photos[idx];
            fsCounter.textContent = (idx + 1) + ' / ' + photos.length;
        });

        fsClose.addEventListener('click', function() { 
            fsGallery.classList.remove('open'); 
        });

        fsGallery.addEventListener('click', function(e) { 
            if (e.target === fsGallery) fsGallery.classList.remove('open'); 
        });
    </script>
</body>
</html>
